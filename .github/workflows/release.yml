name: Release

# Build installers for macOS, Windows, and Linux. A v* tag push (e.g. v1.2.1)
# builds AND publishes a draft GitHub Release; a manual "Run workflow"
# (workflow_dispatch) only builds — useful to verify CI before tagging.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Release installers are built CPU-only (--no-default-features) so they
        # run anywhere without a Vulkan/CUDA runtime. The GPU build is the local
        # default; see GIT.md.
        # `--no-default-features` is a cargo flag, so it must come after `--` to be
        # forwarded to the Rust build (tauri build itself doesn't accept it).
        include:
          - platform: 'macos-latest' # Apple Silicon
            args: '--target aarch64-apple-darwin -- --no-default-features'
            deploymentTarget: '11.0'
          - platform: 'macos-latest' # Intel
            args: '--target x86_64-apple-darwin -- --no-default-features'
            deploymentTarget: '10.15'
          - platform: 'ubuntu-22.04'
            args: '-- --no-default-features'
          - platform: 'windows-latest'
            args: '-- --no-default-features'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            clang \
            libclang-dev \
            libasound2-dev

      - name: Install macOS dependencies
        if: startsWith(matrix.platform, 'macos')
        run: brew list cmake >/dev/null 2>&1 || brew install cmake

      - name: Set up Windows build deps (libclang for bindgen)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # whisper.cpp uses std::filesystem, which Apple's libc++ marks
          # unavailable below macOS 10.15. Empty on Linux/Windows (ignored).
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deploymentTarget }}
        with:
          # On a manual run (not a tag) these are empty, so tauri-action only
          # builds and skips creating a release.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Notes {0}', github.ref_name) || '' }}
          releaseBody: 'See the assets below to download and install Notes.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
